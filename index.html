<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreepyKey & Tempo Analyser</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d12">
    <script src="https://cdn.jsdelivr.net/npm/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <style>
        :root {
            --bg-colour: #0d0d12;
            --surface-colour: #1a1a24;
            --surface-hover: #262635;
            --border-colour: #2d2d3f;
            --text-main: #ffffff;
            --text-muted: #8b8b9f;
            --accent-colour: #00e5ff;
            --match-colour: #55D98D;
            
            --cam-8a: #56C4E8; --cam-9a: #54D1B5; --cam-10a: #55D98D; --cam-11a: #A3E062;
            --cam-12a: #E3E553; --cam-1a: #F2C94C; --cam-2a: #F2994A; --cam-3a: #EB5757;
            --cam-4a: #F24EA4; --cam-5a: #C758E8; --cam-6a: #8F58E8; --cam-7a: #5C58E8;
            --cam-8b: #56C4E8; --cam-9b: #54D1B5; --cam-10b: #55D98D; --cam-11b: #A3E062;
            --cam-12b: #E3E553; --cam-1b: #F2C94C; --cam-2b: #F2994A; --cam-3b: #EB5757;
            --cam-4b: #F24EA4; --cam-5b: #C758E8; --cam-6b: #8F58E8; --cam-7b: #5C58E8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-colour);
            color: var(--text-main);
            margin: 0;
            padding: 3rem 1.5rem 120px 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; margin: 0 0 0.5rem 0; font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--accent-colour); }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: var(--surface-colour);
            color: var(--text-main);
            border: 1px solid var(--border-colour);
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            background-color: var(--surface-hover);
            border-color: var(--text-muted);
        }

        #folder-btn {
            background-color: var(--accent-colour);
            color: #000;
            border: none;
        }

        #folder-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
            background-color: #00e5ff;
        }
        
        .select-container {
            display: flex;
            align-items: center;
            background-color: var(--surface-colour);
            border: 1px solid var(--border-colour);
            border-radius: 8px;
            padding: 0 1.5rem;
            color: var(--text-main);
            gap: 10px;
        }

        .select-container label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .select-container select {
            background-color: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .select-container select option {
            background-color: #12121a;
            color: var(--text-main);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .options-container {
            display: flex;
            gap: 25px;
            margin-bottom: 1.5rem;
            background-color: var(--surface-colour);
            border: 1px solid var(--border-colour);
            border-radius: 8px;
            padding: 1rem 2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-colour);
            cursor: pointer;
            margin: 0;
        }

        #progress-container {
            width: 100%;
            max-width: 1100px;
            height: 6px;
            background-color: var(--surface-colour);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-colour);
            transition: width 0.3s ease;
        }

        #progress-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 500;
        }

        .instruction-tip {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        table {
            width: 100%;
            max-width: 1100px;
            border-collapse: separate;
            border-spacing: 0;
            background-color: var(--surface-colour);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-colour);
        }

        th, td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--border-colour);
        }

        th {
            background-color: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        tr.track-row { transition: opacity 0.2s ease, background-color 0.2s ease; }
        tr.track-row.ready { cursor: pointer; }
        tr.track-row.ready:hover { background-color: var(--surface-hover); }

        table.has-selection tr.track-row.ready { opacity: 0.25; }
        table.has-selection tr.track-row.selected-master {
            opacity: 1 !important;
            background-color: rgba(0, 229, 255, 0.08) !important;
            box-shadow: inset 4px 0 0 var(--accent-colour);
        }
        table.has-selection tr.track-row.harmonic-match {
            opacity: 1 !important;
            background-color: rgba(85, 217, 141, 0.06);
        }

        .track-name { font-weight: 500; }
        .new-name { color: var(--text-muted); }
        .bpm-value { font-family: monospace; font-size: 1.1rem; }
        .genre-value { color: var(--text-muted); }
        
        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #000;
            background-color: var(--border-colour);
        }

        .match-indicator {
            display: none;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--match-colour);
            border: 1px solid var(--match-colour);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        table.has-selection tr.track-row.harmonic-match .match-indicator { display: inline-block; }

        .status { font-weight: 500; }
        .status.loading { color: #F2C94C; }
        .status.complete { color: var(--match-colour); }
        .status.error { color: #EB5757; }

        /* Player Deck */
        #player-deck {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: #12121a;
            border-top: 1px solid var(--border-colour);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        #player-deck.visible { transform: translateY(0); }

        #play-pause-btn {
            background-color: var(--accent-colour);
            color: #000;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.5rem;
            flex-shrink: 0;
            padding: 0;
        }

        #play-pause-btn svg { width: 24px; height: 24px; fill: currentColor; }

        #player-info {
            min-width: 200px;
            margin-right: 1.5rem;
            flex-shrink: 0;
        }

        #player-track-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-metadata {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
        }

        #waveform-container { flex-grow: 1; height: 60px; }
    </style>
</head>
<body>

    <header>
        <h1>Creepy<span>Key</span></h1>
        <p class="subtitle">Studio-grade batch processor with real-time audio playback.</p>
    </header>

    <div class="toolbar">
        <button id="folder-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            Select Folder to Process
        </button>
        <div class="select-container">
            <label for="notation-select">Key Notation</label>
            <select id="notation-select">
                <option value="camelot" selected>Camelot Wheel (8A)</option>
                <option value="standard">Standard Keys (A Minor)</option>
            </select>
        </div>
        <button id="export-m3u8-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Export M3U8 Playlist
        </button>
        <button id="export-csv-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Export CSV Setlist
        </button>
    </div>

    <div class="options-container">
        <label class="checkbox-label">
            <input type="checkbox" id="opt-filename" checked>
            Rename Filename
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="opt-title">
            Prepend Key to Track Title Tag
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="opt-tags">
            Write Key & BPM Tags to ID3
        </label>
    </div>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="progress-text">Analysing 0 of 0 files...</div>

    <div class="instruction-tip">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        Click any analysed track to preview audio and highlight harmonic matches.
    </div>

    <table id="tracks-table">
        <thead>
            <tr>
                <th>Original Name</th>
                <th>New Filename</th>
                <th>BPM</th>
                <th>Key</th>
                <th>Genre</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="results-body">
            </tbody>
    </table>

    <div id="player-deck">
        <button id="play-pause-btn">
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div id="player-info">
            <div id="player-track-name">No track selected</div>
            <div id="player-metadata">
                <span id="player-bpm">-- BPM</span> | 
                <span id="player-key">-- Key</span> |
                <span id="player-genre">-- Genre</span>
            </div>
        </div>
        <div id="waveform-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
